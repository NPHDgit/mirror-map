<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRROR – Project Connections</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    overflow: hidden;
  }

  /* --- LOGIN SCREEN --- */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0f1117;
  }
  .login-box {
    background: #1a1d2e;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 40px;
    width: 380px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .login-box h1 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #f0f0f0;
    margin-bottom: 6px;
  }
  .login-box .login-subtitle {
    font-size: 0.82rem;
    color: #888;
    margin-bottom: 28px;
  }
  .login-box input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    background: #12141f;
    border: 1px solid #333;
    border-radius: 10px;
    color: #e0e0e0;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    text-align: center;
    letter-spacing: 0.15em;
    transition: border-color 0.2s;
  }
  .login-box input[type="password"]:focus {
    border-color: #5b8aff;
  }
  .login-box input[type="password"].error {
    border-color: #e05555;
    animation: shake 0.4s ease;
  }
  .login-box button {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    background: #3a5aaf;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .login-box button:hover { background: #4a6acf; }
  .login-error {
    margin-top: 12px;
    font-size: 0.8rem;
    color: #e05555;
    min-height: 1.2em;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-4px); }
  }

  /* --- APP (hidden until login) --- */
  #app { display: none; }

  .header {
    text-align: center;
    padding: 18px 20px 8px;
    position: relative;
    z-index: 10;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #f0f0f0;
    letter-spacing: -0.02em;
  }
  .header p {
    font-size: 0.82rem;
    color: #888;
    margin-top: 4px;
  }

  .canvas-container {
    position: relative;
    width: 100vw;
    height: calc(100vh - 80px);
  }

  svg.connections-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  svg.connections-svg line {
    pointer-events: stroke;
    cursor: pointer;
  }
  svg.connections-svg line:hover {
    stroke-width: 4 !important;
  }

  .node {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 5;
    text-align: center;
    user-select: none;
    border: 2.5px solid transparent;
  }
  .node:hover {
    transform: scale(1.1);
  }
  .node.selected {
    transform: scale(1.12);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.3), 0 0 30px rgba(255,255,255,0.15);
  }
  .node .label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .node .name {
    font-size: 0.75rem;
    font-weight: 600;
    margin-top: 2px;
    line-height: 1.15;
    max-width: 100px;
  }

  .info-panel {
    position: fixed;
    top: 80px;
    right: 20px;
    width: 320px;
    background: #1a1d2e;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 20px;
    z-index: 20;
    display: none;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .info-panel.visible { display: block; }
  .info-panel .info-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 4px;
  }
  .info-panel .info-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: #f0f0f0;
    margin-bottom: 10px;
  }
  .info-panel .info-desc {
    font-size: 0.82rem;
    color: #aaa;
    line-height: 1.55;
  }
  .info-panel .info-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .info-badge.wp-badge { background: #1a2548; color: #5b8aff; border: 1px solid #3a5aaf; }
  .info-badge.zp-badge { background: #3a1848; color: #bb5bff; border: 1px solid #8a3aaf; }

  .node.wp { background: radial-gradient(circle at 30% 30%, #2a3a6e, #1a2548); border-color: #3a5aaf; }
  .node.wp:hover, .node.wp.selected { border-color: #5b8aff; }
  .node.zp { background: radial-gradient(circle at 30% 30%, #5e2a6e, #3a1848); border-color: #8a3aaf; }
  .node.zp:hover, .node.zp.selected { border-color: #bb5bff; }

  .connection-label {
    position: absolute;
    background: #1e2030;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.75rem;
    color: #ccc;
    max-width: 180px;
    text-align: center;
    z-index: 8;
    pointer-events: auto;
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1.3;
  }
  .connection-label:hover {
    background: #2a2e45;
    border-color: #555;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1d2e;
    border: 1px solid #333;
    border-radius: 14px;
    padding: 28px;
    width: 420px;
    max-width: 92vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h2 {
    font-size: 1.1rem;
    margin-bottom: 6px;
    color: #f0f0f0;
  }
  .modal .subtitle {
    font-size: 0.82rem;
    color: #888;
    margin-bottom: 16px;
  }
  .modal textarea {
    width: 100%;
    min-height: 100px;
    background: #12141f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    padding: 12px;
    font-size: 0.9rem;
    font-family: inherit;
    resize: vertical;
    outline: none;
  }
  .modal textarea:focus { border-color: #5b8aff; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: flex-end;
  }
  .modal-actions button {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cancel { background: #2a2e40; color: #aaa; }
  .btn-cancel:hover { background: #353a50; }
  .btn-save { background: #3a5aaf; color: #fff; }
  .btn-save:hover { background: #4a6acf; }
  .btn-delete { background: #6e2a2a; color: #faa; }
  .btn-delete:hover { background: #8a3a3a; }

  .direction-picker {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .direction-picker button {
    flex: 1;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #12141f;
    color: #aaa;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .direction-picker button:hover { border-color: #555; color: #ddd; }
  .direction-picker button.active {
    border-color: #5b8aff;
    background: #1a2548;
    color: #5b8aff;
  }
  .direction-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 6px;
  }

  .instructions {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1d2e;
    border: 1px solid #2a2e40;
    border-radius: 10px;
    padding: 8px 20px;
    font-size: 0.78rem;
    color: #777;
    z-index: 10;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .instructions span { white-space: nowrap; }
  .instructions .key {
    display: inline-block;
    background: #2a2e40;
    color: #aaa;
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 0.72rem;
  }

  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>MIRROR</h1>
    <div class="login-subtitle">Meningioma Research Unit – Collaboration Map</div>
    <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
    <button id="loginBtn">Access</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP (hidden until authenticated) -->
<div id="app">
  <div class="header">
    <h1>MIRROR – Meningioma Research Unit</h1>
    <p>Collaboration Map of Subprojects & Z-Projects</p>
  </div>

  <div class="canvas-container" id="canvas">
    <svg class="connections-svg" id="svg"></svg>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="info-label" id="infoPanelLabel"></div>
    <div class="info-badge" id="infoPanelBadge"></div>
    <div class="info-name" id="infoPanelName"></div>
    <div class="info-desc" id="infoPanelDesc"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Describe Collaboration</h2>
      <div class="subtitle" id="modalSubtitle"></div>
      <div class="direction-label">Direction</div>
      <div class="direction-picker" id="directionPicker">
        <button data-dir="both" class="active" id="dirBoth">&#8596; Bidirectional</button>
        <button data-dir="forward" id="dirForward">&#8594; A &rarr; B</button>
        <button data-dir="reverse" id="dirReverse">&#8592; B &rarr; A</button>
      </div>
      <textarea id="modalText" placeholder="Describe the collaboration between these projects..."></textarea>
      <div class="modal-actions">
        <button class="btn-delete" id="btnDelete" style="margin-right:auto">Remove</button>
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-save" id="btnSave">Save</button>
      </div>
    </div>
  </div>

  <div class="instructions">
    <span><span class="key">Click</span> Select project</span>
    <span><span class="key">2× Click</span> Create connection</span>
    <span><span class="key">Click line/label</span> Edit note</span>
    <span><span class="key">ESC</span> Deselect</span>
  </div>
</div>

<script>
// --- PASSWORD PROTECTION (SHA-256 hash comparison) ---
const PASS_HASH = 'ffce6a8af578b957a2343bc2949ac03ba1331e0dd470c14e9e8a57bee881f478';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('app');
const passwordInput = document.getElementById('passwordInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');

async function attemptLogin() {
  const hash = await sha256(passwordInput.value);
  if (hash === PASS_HASH) {
    loginScreen.style.display = 'none';
    appScreen.style.display = 'block';
    document.body.style.overflow = 'hidden';
    initApp();
  } else {
    passwordInput.classList.add('error');
    loginError.textContent = 'Incorrect password';
    setTimeout(() => {
      passwordInput.classList.remove('error');
      loginError.textContent = '';
    }, 1500);
  }
}

loginBtn.addEventListener('click', attemptLogin);
passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
setTimeout(() => passwordInput.focus(), 100);

// --- APP LOGIC ---
const projects = [
  { id: 'sp1', label: 'SP 1', name: 'Sahm / Berghaus', type: 'wp',
    desc: 'Investigates host- and tumor-specific drivers of meningioma heterogeneity using AI-powered spatial and single-cell profiling methods. Utilizes an archive of over 6,000 meningiomas with methylation data. Develops AI models on H&E sections for molecular diagnosis determination. Analyzes sex- and age-specific differences in tumor biology and microenvironment.' },
  { id: 'sp2', label: 'SP 2', name: 'Herold-Mende / Warta', type: 'wp',
    desc: 'Explores sex- and age-related differences of the tumor microenvironment and their influence on therapy sensitivity. Employs tumor organoids and drug screenings to test immunotherapeutic approaches in vitro. Phenotypes immune infiltrates and integrates multi-omics data. Provides an extensive biobank with patient tissue and blood samples.' },
  { id: 'sp3', label: 'SP 3', name: 'Morrison / Mawrin', type: 'wp',
    desc: 'Models environmental and age-related meningioma drivers based on NF2-mutated tumors. Combines structural, cellular, and mouse models with zebrafish studies. Investigates pediatric meningiomas and novel therapeutic targets. Conducts metabolomic analyses and examines the role of aging in tumorigenesis.' },
  { id: 'sp4', label: 'SP 4', name: 'Prinz / Sankowski', type: 'wp',
    desc: 'Maps origin, fate, and local interactions of myeloid cell subpopulations in meningioma. Utilizes high-dimensional techniques such as spatial and single-cell sequencing. Employs transgenic mouse models and syngeneic meningioma models for functional analyses. Provides insights into the CNS immune landscape beyond brain tumors.' },
  { id: 'sp5', label: 'SP 5', name: 'Ricklefs / Lamszus', type: 'wp',
    desc: 'Investigates extracellular vesicles (EVs) as biomarkers and modulators of tumor-immune cell communication in meningioma patients. Develops liquid biopsy approaches for longitudinal monitoring of circulating EVs. Analyzes DNA methylation signatures for tumor classification. Introduces enrichment and detection protocols for tumor-specific EVs.' },
  { id: 'sp6', label: 'SP 6', name: 'Bernhardt / Abdollahi', type: 'wp',
    desc: 'Reprograms the tumor-immune microenvironment through particle irradiation (proton therapy). Conducts systematic radiobiological characterization of meningiomas. Investigates the evolution of the tumor microenvironment under radiation therapy. Provides longitudinal multi-scale data from irradiated patients.' },
  { id: 'sp7', label: 'SP 7', name: 'Reifenberger / Qin / Dietrich', type: 'wp',
    desc: 'Explores the role of long non-coding RNAs (lncRNAs) in meningioma evolution and therapy response. Utilizes CODEX multiplex immunofluorescence and immune receptor repertoire analyses. Conducts ex-vivo drug screenings for personalized treatment designs. Provides one of the largest brain tumor tissue banks.' },
  { id: 'zg', label: 'Z-G', name: 'Sahm / Bludau', type: 'zp',
    desc: 'Central service project for standardized data generation and collection across the entire research group. Performs single-cell and spatial sequencing, long-read sequencing, and protein analyses. Establishes and maintains the central MIRROR database. Optimizes protocols such as snRNA on FFPE samples and RAPID-CNS nanopore.' },
  { id: 'za', label: 'Z-A', name: 'Heiland / Yabo', type: 'zp',
    desc: 'Central service project for cross-project, multidimensional data integration. Develops AI-powered pattern recognition for biologically and clinically relevant insights. Integrates multi-omics data from all subprojects into a cross-species reference. Provides existing datasets and delivers new biomaterials through surgical affiliation.' },
];

let connections = [];
let selectedNode = null;
let editingConnection = null;
let canvas, svg, modalOverlay, modalTitle, modalSubtitle, modalText, btnSave, btnCancel, btnDelete;
let infoPanel, infoPanelLabel, infoPanelBadge, infoPanelName, infoPanelDesc;

function layoutNodes() {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const radius = Math.min(cx, cy) * 0.65;
  const count = projects.length;
  projects.forEach((p, i) => {
    const angle = (2 * Math.PI * i / count) - Math.PI / 2;
    p.x = cx + radius * Math.cos(angle);
    p.y = cy + radius * Math.sin(angle);
  });
}

function showInfo(p) {
  infoPanelLabel.textContent = p.label;
  infoPanelBadge.textContent = p.type === 'wp' ? 'Subproject' : 'Z-Project';
  infoPanelBadge.className = `info-badge ${p.type === 'wp' ? 'wp-badge' : 'zp-badge'}`;
  infoPanelName.textContent = p.name;
  infoPanelDesc.textContent = p.desc;
  infoPanel.classList.add('visible');
}
function hideInfo() { infoPanel.classList.remove('visible'); }

function renderNodes() {
  document.querySelectorAll('.node').forEach(n => n.remove());
  projects.forEach(p => {
    const el = document.createElement('div');
    el.className = `node ${p.type}${selectedNode === p.id ? ' selected' : ''}`;
    el.style.left = (p.x - 60) + 'px';
    el.style.top = (p.y - 60) + 'px';
    el.innerHTML = `<div class="label">${p.label}</div><div class="name">${p.name}</div>`;
    el.addEventListener('click', () => handleNodeClick(p.id));
    el.addEventListener('mouseenter', () => showInfo(p));
    el.addEventListener('mouseleave', () => hideInfo());
    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const newName = prompt('Change project name:', p.name);
      if (newName !== null && newName.trim()) { p.name = newName.trim(); renderAll(); }
    });
    canvas.appendChild(el);
  });
}

function drawArrowhead(x1, y1, x2, y2, color, nodeRadius) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return;
  const ux = dx / len, uy = dy / len;
  // Position arrow tip at edge of target node
  const tipX = x2 - ux * nodeRadius;
  const tipY = y2 - uy * nodeRadius;
  const size = 10;
  const angle = Math.atan2(dy, dx);
  const a1 = angle + Math.PI * 0.82;
  const a2 = angle - Math.PI * 0.82;
  const p1x = tipX + size * Math.cos(a1), p1y = tipY + size * Math.sin(a1);
  const p2x = tipX + size * Math.cos(a2), p2y = tipY + size * Math.sin(a2);
  const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  arrow.setAttribute('points', `${tipX},${tipY} ${p1x},${p1y} ${p2x},${p2y}`);
  arrow.setAttribute('fill', color);
  arrow.setAttribute('fill-opacity', '0.8');
  svg.appendChild(arrow);
}

function renderConnections() {
  svg.innerHTML = '';
  document.querySelectorAll('.connection-label').forEach(l => l.remove());
  const nodeRadius = 62;
  connections.forEach((conn, idx) => {
    const from = projects.find(p => p.id === conn.from);
    const to = projects.find(p => p.id === conn.to);
    if (!from || !to) return;
    const color = (from.type === 'zp' || to.type === 'zp') ? '#8a5abf' : '#4a6aaf';
    const dir = conn.direction || 'both';
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x); line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x); line.setAttribute('y2', to.y);
    line.setAttribute('stroke', color); line.setAttribute('stroke-width', '2.5');
    line.setAttribute('stroke-opacity', '0.6'); line.setAttribute('stroke-linecap', 'round');
    line.style.cursor = 'pointer'; line.style.pointerEvents = 'stroke';
    line.addEventListener('click', () => openModal(idx));
    svg.appendChild(line);
    // Draw arrowheads based on direction
    if (dir === 'forward' || dir === 'both') {
      drawArrowhead(from.x, from.y, to.x, to.y, color, nodeRadius);
    }
    if (dir === 'reverse' || dir === 'both') {
      drawArrowhead(to.x, to.y, from.x, from.y, color, nodeRadius);
    }
    // Small dot indicator at midpoint (click to open modal)
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
    circle.setAttribute('cx', mx); circle.setAttribute('cy', my);
    circle.setAttribute('r', conn.note ? '6' : '5');
    circle.setAttribute('fill', conn.note ? '#fff' : color);
    circle.setAttribute('fill-opacity', conn.note ? '0.5' : '0.8');
    circle.style.cursor = 'pointer'; circle.style.pointerEvents = 'auto';
    circle.addEventListener('click', () => openModal(idx));
    svg.appendChild(circle);
  });
}

function renderAll() { renderConnections(); renderNodes(); }

function handleNodeClick(id) {
  if (selectedNode === null) { selectedNode = id; renderAll(); }
  else if (selectedNode === id) { selectedNode = null; renderAll(); }
  else {
    const existingIdx = connections.findIndex(c =>
      (c.from === selectedNode && c.to === id) || (c.from === id && c.to === selectedNode));
    if (existingIdx >= 0) { selectedNode = null; renderAll(); openModal(existingIdx); }
    else { connections.push({ from: selectedNode, to: id, note: '', direction: 'both' }); const newIdx = connections.length - 1; selectedNode = null; renderAll(); openModal(newIdx); }
  }
}

function openModal(connIdx) {
  editingConnection = connIdx;
  const conn = connections[connIdx];
  const from = projects.find(p => p.id === conn.from);
  const to = projects.find(p => p.id === conn.to);
  modalTitle.textContent = 'Describe Collaboration';
  modalSubtitle.textContent = `${from.label} (${from.name}) \u2194 ${to.label} (${to.name})`;
  modalText.value = conn.note || '';
  // Set direction buttons
  const dir = conn.direction || 'both';
  document.querySelectorAll('#directionPicker button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#directionPicker button[data-dir="${dir}"]`).classList.add('active');
  // Update direction button labels with actual project names
  document.getElementById('dirForward').innerHTML = `&#8594; ${from.label} &rarr; ${to.label}`;
  document.getElementById('dirReverse').innerHTML = `&#8592; ${to.label} &rarr; ${from.label}`;
  modalOverlay.classList.add('active');
  setTimeout(() => modalText.focus(), 100);
}

function closeModal() { modalOverlay.classList.remove('active'); editingConnection = null; }

function initApp() {
  canvas = document.getElementById('canvas');
  svg = document.getElementById('svg');
  modalOverlay = document.getElementById('modalOverlay');
  modalTitle = document.getElementById('modalTitle');
  modalSubtitle = document.getElementById('modalSubtitle');
  modalText = document.getElementById('modalText');
  btnSave = document.getElementById('btnSave');
  btnCancel = document.getElementById('btnCancel');
  btnDelete = document.getElementById('btnDelete');
  infoPanel = document.getElementById('infoPanel');
  infoPanelLabel = document.getElementById('infoPanelLabel');
  infoPanelBadge = document.getElementById('infoPanelBadge');
  infoPanelName = document.getElementById('infoPanelName');
  infoPanelDesc = document.getElementById('infoPanelDesc');

  // Direction picker logic
  document.querySelectorAll('#directionPicker button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#directionPicker button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  btnSave.addEventListener('click', () => {
    if (editingConnection !== null) {
      connections[editingConnection].note = modalText.value.trim();
      const activeDir = document.querySelector('#directionPicker button.active');
      connections[editingConnection].direction = activeDir ? activeDir.dataset.dir : 'both';
      renderAll();
    }
    closeModal();
  });
  btnCancel.addEventListener('click', closeModal);
  btnDelete.addEventListener('click', () => {
    if (editingConnection !== null) { connections.splice(editingConnection, 1); renderAll(); }
    closeModal();
  });
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (modalOverlay.classList.contains('active')) closeModal();
      else { selectedNode = null; renderAll(); }
    }
    if (e.key === 'Enter' && e.ctrlKey && modalOverlay.classList.contains('active')) btnSave.click();
  });
  canvas.addEventListener('click', (e) => { if (e.target === canvas || e.target === svg) { selectedNode = null; renderAll(); } });
  window.addEventListener('resize', () => { layoutNodes(); renderAll(); });

  layoutNodes();
  renderAll();
}
</script>
</body>
</html>
